[tools]
actionlint = "latest"
dprint = "latest"
ghalint = "latest"
gitleaks = "latest"
hk = "latest"
lua = "5.4"
rumdl = "latest"
shellcheck = "latest"
shfmt = "latest"
stylua = "latest"
taplo = "latest"
tombi = "latest"
typos = "latest"
# yamllint = "latest"
zizmor = "latest"

[tasks.test]
description = "Run Lua unit tests with busted"
run = "busted -p 'test_.*%.lua' tests"

[hooks]
postinstall = ["luarocks install busted", "luarocks install luacheck"]

[settings]
experimental = true # for hooks

[env]
HK_PKL_BACKEND = "pklr"
