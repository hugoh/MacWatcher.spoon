[tools]
"github:orhun/git-cliff" = "2.13.1"
actionlint = "1.7.12"
dprint = "0.55.1"
ghalint = "1.5.6"
gitleaks = "8.30.1"
hk = "1.48.0"
lua = "5.4"
ruff = "0.15.20"
uv = "0.8.17"
rumdl = "0.2.25"
shellcheck = "0.11.0"
shfmt = "3.13.1"
stylua = "2.5.2"
taplo = "0.10.0"
tombi = "1.1.6"
typos = "1.47.2"
yamllint = "1.38.0"
zizmor = "1.26.1"

[tasks.docs]
run = "uvx --from git+https://github.com/hugoh/spoon-scripts spoon-generate-docs"
description = "Generate docs/docs.json and docs/index.html from docstrings"

[tasks.package]
depends = ["docs"]
run = """
rm -rf dist
mkdir -p dist/MacWatcher.spoon
cp init.lua LICENSE README.md docs/docs.json dist/MacWatcher.spoon/
cd dist
zip -r ../MacWatcher.spoon.zip MacWatcher.spoon
cd ..
rm -rf dist
"""
description = "Build a self-contained MacWatcher.spoon.zip (includes docs.json)"

[tasks.test]
description = "Run Lua unit tests with busted"
run = "busted -p 'test_.*%.lua' tests"

[hooks]
postinstall = ["luarocks install busted", "luarocks install luacheck"]

[settings]
experimental = true # for hooks

[env]
HK_PKL_BACKEND = "pklr"
