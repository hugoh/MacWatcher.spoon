[tools]
"github:orhun/git-cliff" = "latest"
actionlint = "latest"
dprint = "latest"
ghalint = "latest"
gitleaks = "latest"
hk = "latest"
lua = "5.4"
rumdl = "latest"
shellcheck = "latest"
shfmt = "latest"
stylua = "latest"
taplo = "latest"
tombi = "latest"
typos = "latest"
# yamllint = "latest"
zizmor = "latest"

[tasks.package]
run = """
rm -rf dist
mkdir -p dist/MacWatcher.spoon
cp init.lua LICENSE README.md dist/MacWatcher.spoon/
cd dist
zip -r ../MacWatcher.spoon.zip MacWatcher.spoon
cd ..
rm -rf dist
"""
description = "Build a self-contained MacWatcher.spoon.zip"

[tasks.test]
description = "Run Lua unit tests with busted"
run = "busted -p 'test_.*%.lua' tests"

[hooks]
postinstall = ["luarocks install busted", "luarocks install luacheck"]

[settings]
experimental = true # for hooks

[env]
HK_PKL_BACKEND = "pklr"
