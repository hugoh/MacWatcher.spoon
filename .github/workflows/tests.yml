name: Tests

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac

      - name: Run tests
        run: mise run test
